name: telpozt
description: Telegram Channel Automation Management Console
version: 1.0.0+1
publish_to: 'none'

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.5.1
  dio: ^5.5.0
  go_router: ^13.2.4
  flutter_secure_storage: ^9.2.2
  shared_preferences: ^2.2.3
  local_auth: ^2.2.0
  package_info_plus: ^8.0.1
  intl: ^0.19.0
  timezone: ^0.9.4
  flutter_datetime_picker_plus: ^2.2.0
  cached_network_image: ^3.3.1
  flutter_svg: ^2.0.10+1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.2

flutter:
  uses-material-design: true
  assets:
    - assets/images/logo.png
  fonts:
    - family: Monda
      fonts:
        - asset: assets/fonts/Monda-Regular.ttf
          weight: 400
        - asset: assets/fonts/Monda-Bold.ttf
          weight: 700
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Regular.ttf
          weight: 400
        - asset: assets/fonts/Inter-Medium.ttf
          weight: 500
        - asset: assets/fonts/Inter-Bold.ttf
          weight: 700
